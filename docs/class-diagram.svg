<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900">
  <style>
    .box { fill: #f4f9ff; stroke: #1f5bb5; stroke-width: 2; }
    .title { font: bold 14px sans-serif; fill: #0b2e6f; }
    .text { font: 12px sans-serif; fill: #1f3f70; }
    .line { fill: none; stroke: #1f5bb5; stroke-width: 2; marker-end: url(#arrow); }
    .group { fill: #eef4ff; stroke: #aac8ff; stroke-width: 1.5; }
    .group-label { font: bold 16px sans-serif; fill: #1f3f70; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5bb5" />
    </marker>
  </defs>

  <!-- API Layer -->
  <rect class="group" x="40" y="20" width="1120" height="140" rx="12" ry="12" />
  <text class="group-label" x="60" y="45">API Layer</text>

  <rect class="box" x="140" y="65" width="240" height="80" rx="12" ry="12" />
  <text class="title" x="160" y="95">ExcelController</text>
  <text class="text" x="160" y="115">receives upload requests</text>

  <rect class="box" x="430" y="55" width="320" height="100" rx="12" ry="12" />
  <text class="title" x="450" y="85">ExcelValidationService</text>
  <text class="text" x="450" y="105">orchestrates rule execution</text>
  <text class="text" x="450" y="123">loads config, aggregates response</text>

  <!-- Rule Execution Layer -->
  <rect class="group" x="40" y="180" width="1120" height="220" rx="12" ry="12" />
  <text class="group-label" x="60" y="205">Rule Execution Layer</text>

  <rect class="box" x="140" y="225" width="220" height="80" rx="12" ry="12" />
  <text class="title" x="160" y="255">RuleExecutorRegistry</text>
  <text class="text" x="160" y="275">lookup executor by key</text>

  <rect class="box" x="430" y="225" width="220" height="80" rx="12" ry="12" />
  <text class="title" x="450" y="255">RuleExecutor</text>
  <text class="text" x="450" y="275">generic executor API</text>

  <rect class="box" x="740" y="225" width="220" height="80" rx="12" ry="12" />
  <text class="title" x="760" y="255">WorkbookRuleExecutor</text>
  <text class="text" x="760" y="275">delegates requiredSheets</text>

  <rect class="box" x="740" y="325" width="220" height="80" rx="12" ry="12" />
  <text class="title" x="760" y="355">CellRuleExecutor</text>
  <text class="text" x="760" y="375">delegates cellRules</text>

  <rect class="box" x="740" y="425" width="220" height="80" rx="12" ry="12" />
  <text class="title" x="760" y="455">TableRuleExecutor</text>
  <text class="text" x="760" y="475">delegates tableRules</text>

  <!-- Engine Layer -->
  <rect class="group" x="40" y="430" width="1120" height="220" rx="12" ry="12" />
  <text class="group-label" x="60" y="455">Engine Layer</text>

  <rect class="box" x="180" y="470" width="240" height="80" rx="12" ry="12" />
  <text class="title" x="200" y="500">WorkbookRuleEngine</text>
  <text class="text" x="200" y="520">validate required sheets</text>

  <rect class="box" x="480" y="470" width="240" height="80" rx="12" ry="12" />
  <text class="title" x="500" y="500">CellRuleEngine</text>
  <text class="text" x="500" y="520">validate cell rules</text>

  <rect class="box" x="780" y="470" width="240" height="80" rx="12" ry="12" />
  <text class="title" x="800" y="500">TableRuleEngine</text>
  <text class="text" x="800" y="520">validate table rows</text>

  <!-- Model Layer -->
  <rect class="group" x="40" y="660" width="1120" height="220" rx="12" ry="12" />
  <text class="group-label" x="60" y="685">Model Layer</text>

  <rect class="box" x="120" y="700" width="200" height="80" rx="12" ry="12" />
  <text class="title" x="140" y="730">ValidationConfig</text>
  <text class="text" x="140" y="750">active rule schema</text>

  <rect class="box" x="360" y="700" width="200" height="80" rx="12" ry="12" />
  <text class="title" x="380" y="730">FileRuleConfig</text>
  <text class="text" x="380" y="750">cellRules & tableRules</text>

  <rect class="box" x="600" y="700" width="200" height="80" rx="12" ry="12" />
  <text class="title" x="620" y="730">CellRuleConfig</text>
  <text class="text" x="620" y="750">single-cell rule</text>

  <rect class="box" x="840" y="700" width="200" height="80" rx="12" ry="12" />
  <text class="title" x="860" y="730">TableRuleConfig</text>
  <text class="text" x="860" y="750">table rule model</text>

  <rect class="box" x="1060" y="700" width="120" height="80" rx="12" ry="12" />
  <text class="title" x="1080" y="730">FileValidationResult</text>
  <text class="text" x="1080" y="750">validation outcome</text>

  <rect class="box" x="1060" y="800" width="120" height="80" rx="12" ry="12" />
  <text class="title" x="1080" y="830">CellValidationError</text>
  <text class="text" x="1080" y="850">error detail</text>

  <!-- Arrows -->
  <path class="line" d="M380 110 L430 110" />
  <path class="line" d="M570 105 L630 225" />
  <path class="line" d="M810 105 L810 225" />
  <path class="line" d="M810 315 L810 325" />
  <path class="line" d="M810 425 L810 435" />
  <path class="line" d="M260 380 L260 470" />
  <path class="line" d="M560 380 L560 470" />
  <path class="line" d="M860 380 L860 470" />
  <path class="line" d="M680 580 L680 700" />
  <path class="line" d="M900 580 L900 700" />
  <path class="line" d="M1120 580 L1120 700" />
  <path class="line" d="M520 635 L520 700" />
  <path class="line" d="M1080 780 L1080 800" marker-end="url(#arrow)" />
</svg>
